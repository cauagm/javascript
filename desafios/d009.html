<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Desconto</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-size: 2.8em;
        }
        button {
            padding: 20px;
            font-size: 1.5em;
            border-radius: 25px;
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.235);
            transition: transform .2s ease;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.23);
        }
        p {
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div>
        <h1>Calcular Desconto</h1>
        <button onclick="calcular()">Desconto de 10%</button>
    </div>
    <div id="res">
        <p>Clique no botão acima para iniciar</p>
    </div>
    <script>
        function calcular() {
            let prod = prompt('Qual é o produto que você está comprando?')
            let preco = Number(prompt(`Qual é o preço de ${prod}?`))
            let res = document.getElementById('res')
            let desc = preco * 0.10
            let precoFinal = preco - desc
            res.innerHTML = `<p><strong>Calculando desconto de 10% para ${prod}</strong></p>`
            res.innerHTML += `<p>O preço original era R$ ${preco}.</p>`
            res.innerHTML += `<p>Você acaba de ganhar R$ ${desc.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits:2 })} de desconto (-10%).</p>`
            res.innerHTML += `<p>No fim, você vai pagar R$ ${precoFinal.toLocaleString('pt-BR', {maximumFractionDigits: 2})} no produto ${prod}.</p>`

        }
    </script>
</body>
</html>
