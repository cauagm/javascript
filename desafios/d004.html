<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antes e depois</title>
     <style>
        h1{
            font-family: Arial, Helvetica, sans-serif;
        }

        button{
            padding: 15px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            border-radius: 5px;
            background-color: lightgray;
        }

        button:hover {
            background-color: lightblue;
            transition: .5s;
        }
    </style>
</head>
<body>
    <h1>Antes e depois</h1>
    <button onclick="clicar()">Antecessor e Sucessor</button>
    <script>
        function clicar() {
            var n = Number(prompt('Digite um número qualquer'))
            let antecessor = n - 1
            let sucessor = n + 1
            alert(`\nAntes de ${n}, temos o número ${antecessor} \n Depois de ${n}, temos o número ${sucessor}`)
        }
    </script>
</body>
</html>
