<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situação do aluno</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: lightgrey;
        }
        section {
            background-color: rgb(182, 255, 255);
            padding: 20px;

            text-align: center;
            border-radius: 15px;
            box-shadow: 4px 10px 10px rgba(0, 0, 0, 0.259);
            
        }
        h1 {
            font-size: 2.8em;
        }
        button {
            padding: 20px;
            font-size: 1.5em;
            border-radius: 25px;
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.235);
            transition: transform .2s ease;
        }

        button:hover{
            transform: translateY(-3px);
            box-shadow: 0px 10px 10px rgba(0, 0, 0, 0.23);
        }
        p {
            padding-top: 30px;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <section>
        <div>
            <h1>Situação do aluno</h1>
            <button onclick="notas()">Entrar com as notas</button>
        </div>
        <div id="res">
            <p>Clique no botão acima para informar as notas do aluno.</p>
        </div>
    </section>
    <script>
        function notas() {
            let nome = prompt('Qual é o nome do aluno?')
            let nota1 = Number(prompt(`Qual a primeira nota de ${nome}:`))
            let nota2 = Number(prompt(`Segunda nota de ${nome}:`))
            let res = document.getElementById('res')
            let media = (nota1 + nota2) / 2
            res.innerHTML = `<p><strong>Analisando a sitação de ${nome}</strong></p>`
            res.innerHTML += `<p>Com as notas ${nota1} e ${nota2}, a <strong>média é ${media}</strong></p>`
            if (media < 3) {
                res.innerHTML += `<p>Com a média abaixo de 3,0, o aluno está <span style="background-color: salmon; color: darkred;">REPROVADO</span></p>`
            }else if (media > 6){
                res.innerHTML += `<p>Com a média acima de 6,0, o aluno está <span style="background-color: lightgreen; color: green;">APROVADO</span></p>`
            }else if (media >= 3 || media < 6) {
                res.innerHTML += `<p>Com a média entre 3,0 e 6,0, o aluno está em <span style="background-color: lightyellow; color: orange;">RECUPERAÇÃO</span></p>`
            }
            
        }
    </script>
</body>
</html>
