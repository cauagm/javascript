<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 1</title>
    <style>
        body {
            background-color: rgba(133, 239, 239, 0.303);
        }
        h1 {
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 30pt;
        }

        input {
            font: normal 20pt Arial;
            padding: 20px;
            border-radius: 5px;
            background-color: red;
        }
    </style>
</head>
<body>
    <h1>Desafio das Mensagens</h1>
    <input type="button" value="Botão 1" onclick="clicar(1)" id="btn1">
    <input type="button" value="Botão 2" onclick="clicar(2)" id="btn2">
    <input type="button" value="Botão 3" onclick="clicar(3)" id="btn3">
    <script>
        function clicar(num) {
            window.alert('Você clicou no botão ' + num)
        }      
    </script>
</body>
</html>
