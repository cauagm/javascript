<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
    <style>
        body {
            background-color: rgba(192, 255, 192, 0.6);
            font-family: Arial, Helvetica, sans-serif;
        }

        h1 {
            text-align: center;
            text-decoration: underline;
            color: rgb(0, 61, 0);
        }
        input[type ="text"] {
            border: solid green 2px;
            box-shadow: 1px 2px 5px black;
        }
        .pergunta{
            font-weight: bold;
        }

    </style>
</head>
<body>
    <h1>Sistema de Nacionalidade</h1>
    <p class="pergunta"">Qual sua nacionalidade? <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="verificar()"></p>
    <div id="res">

    </div>
    <script>
        function verificar() {
            var txtp = document.getElementById('txtpais')
            var res = document.getElementById('res')
            var pais = (txtp.value)
            res.innerHTML = `<p>Vivendo em ${pais}!</p>`
            if (pais == 'Brasil') {
                res.innerHTML += `<p>Você é <strong>Brasileiro!</strong></p>`
            }else {
                res.innerHTML += `<p>Você é <strong>Estrangeiro!</strong></p>`
            }
        }
    </script>
</body>
</html>
